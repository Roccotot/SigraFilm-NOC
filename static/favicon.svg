<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Sfondo -->
  <rect width="32" height="32" rx="4" fill="#161b22"/>
  <!-- Striscia superiore -->
  <rect x="0" y="0" width="32" height="7" rx="3" fill="#21262d"/>
  <rect x="0" y="4" width="32" height="3" fill="#21262d"/>
  <!-- Striscia inferiore -->
  <rect x="0" y="25" width="32" height="7" rx="3" fill="#21262d"/>
  <rect x="0" y="25" width="32" height="3" fill="#21262d"/>
  <!-- Fori superiori (sprocket holes) -->
  <rect x="2"  y="2" width="4" height="3" rx="1" fill="#161b22"/>
  <rect x="9"  y="2" width="4" height="3" rx="1" fill="#161b22"/>
  <rect x="16" y="2" width="4" height="3" rx="1" fill="#161b22"/>
  <rect x="23" y="2" width="4" height="3" rx="1" fill="#161b22"/>
  <!-- Fori inferiori -->
  <rect x="2"  y="27" width="4" height="3" rx="1" fill="#161b22"/>
  <rect x="9"  y="27" width="4" height="3" rx="1" fill="#161b22"/>
  <rect x="16" y="27" width="4" height="3" rx="1" fill="#161b22"/>
  <rect x="23" y="27" width="4" height="3" rx="1" fill="#161b22"/>
  <!-- Fotogramma sinistra -->
  <rect x="2" y="9" width="12" height="14" rx="1" fill="#e63946" opacity="0.85"/>
  <!-- Divisore -->
  <rect x="15" y="9" width="2" height="14" fill="#161b22"/>
  <!-- Fotogramma destra -->
  <rect x="18" y="9" width="12" height="14" rx="1" fill="#e63946" opacity="0.45"/>
</svg>
