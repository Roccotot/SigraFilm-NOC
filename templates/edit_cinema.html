<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Modifica Cinema — SigraFilm NOC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    #map-picker { height: 280px; border-radius: 8px; border: 1px solid #dee2e6; }
    .coord-badge { font-size: .78rem; color: var(--text-3, #888); }
  </style>
</head>
<body>

  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="{{ url_for('dashboard') }}">
        <img src="{{ url_for('static', filename='logo_sigra.png') }}" alt="SigraFilm" height="44">
      </a>
    </div>
  </nav>

  <div class="container mt-4" style="max-width:600px;">
    <h2 class="page-heading mb-4">Modifica cinema</h2>

    <div class="card shadow-sm">
      <div class="card-body">
        <form method="post" action="{{ url_for('edit_cinema', cinema_id=c.id) }}">

          <div class="row g-2 mb-3">
            <div class="col-12 col-md-7">
              <label class="form-label">Nome</label>
              <input type="text" name="nome" class="form-control" value="{{ c.nome }}" required>
            </div>
            <div class="col-8 col-md-4">
              <label class="form-label">Città</label>
              <input type="text" name="città" class="form-control" value="{{ c.città }}" required>
            </div>
            <div class="col-4 col-md-1" style="min-width:90px;">
              <label class="form-label">Sale</label>
              <input type="number" name="num_sale" class="form-control" value="{{ c.num_sale }}" min="1" max="30" required>
            </div>
          </div>

          <div class="row g-2 mb-3">
            <div class="col-12 col-md-5">
              <label class="form-label">Telefono</label>
              <input type="text" name="telefono" class="form-control" value="{{ c.telefono or '' }}" placeholder="es. 0571 12345">
            </div>
            <div class="col-12 col-md-7">
              <label class="form-label">Indirizzo</label>
              <div class="input-group">
                <input type="text" name="indirizzo" id="indirizzo" class="form-control" value="{{ c.indirizzo or '' }}" placeholder="Via Roma 1, Firenze">
                <button type="button" class="btn btn-outline-secondary" id="btn-geocode" title="Geocodifica indirizzo">📍</button>
              </div>
            </div>
          </div>

          <!-- Mappa selezione coordinate -->
          <div class="mb-3">
            <label class="form-label d-flex justify-content-between align-items-center">
              <span>Posizione sulla mappa</span>
              <span class="coord-badge" id="coord-display">
                {% if c.lat and c.lng %}{{ "%.5f"|format(c.lat) }}, {{ "%.5f"|format(c.lng) }}{% else %}clicca sulla mappa per impostare{% endif %}
              </span>
            </label>
            <div id="map-picker"></div>
            <input type="hidden" name="lat" id="lat" value="{{ c.lat or '' }}">
            <input type="hidden" name="lng" id="lng" value="{{ c.lng or '' }}">
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success flex-grow-1">✓ Salva</button>
            <a href="{{ url_for('admin_cinemas') }}" class="btn btn-secondary">Annulla</a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    var initLat = {{ c.lat if c.lat else 43.5 }};
    var initLng = {{ c.lng if c.lng else 11.0 }};
    var hasCoords = {{ 'true' if c.lat and c.lng else 'false' }};

    var map = L.map('map-picker').setView([initLat, initLng], hasCoords ? 14 : 8);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    var marker = null;
    if (hasCoords) {
      marker = L.marker([initLat, initLng]).addTo(map);
    }

    map.on('click', function(e) {
      var lat = e.latlng.lat.toFixed(6);
      var lng = e.latlng.lng.toFixed(6);
      document.getElementById('lat').value = lat;
      document.getElementById('lng').value = lng;
      document.getElementById('coord-display').textContent = lat + ', ' + lng;
      if (marker) {
        marker.setLatLng(e.latlng);
      } else {
        marker = L.marker(e.latlng).addTo(map);
      }
    });

    // Geocodifica indirizzo via Nominatim
    document.getElementById('btn-geocode').addEventListener('click', function() {
      var addr = document.getElementById('indirizzo').value.trim();
      if (!addr) return;
      this.disabled = true;
      this.textContent = '…';
      var self = this;
      fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + encodeURIComponent(addr), {
        headers: { 'Accept-Language': 'it' }
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        self.disabled = false;
        self.textContent = '📍';
        if (data && data.length > 0) {
          var lat = parseFloat(data[0].lat).toFixed(6);
          var lng = parseFloat(data[0].lon).toFixed(6);
          document.getElementById('lat').value = lat;
          document.getElementById('lng').value = lng;
          document.getElementById('coord-display').textContent = lat + ', ' + lng;
          var latlng = [parseFloat(lat), parseFloat(lng)];
          map.setView(latlng, 15);
          if (marker) {
            marker.setLatLng(latlng);
          } else {
            marker = L.marker(latlng).addTo(map);
          }
        } else {
          alert('Indirizzo non trovato. Prova a essere più specifico.');
        }
      })
      .catch(function() {
        self.disabled = false;
        self.textContent = '📍';
        alert('Errore durante la geocodifica.');
      });
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
