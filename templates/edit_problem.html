<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Modifica Problema — SigraFilm NOC</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center gap-2" href="{{ url_for('dashboard') }}">
        <img src="{{ url_for('static', filename='logo_sigra.png') }}" alt="SigraFilm" height="44">
        <span class="nav-user-chip">{{ session.get("username") }}</span>
      </a>
      <div class="d-flex align-items-center gap-2">
        <a href="{{ url_for('dashboard') }}" class="btn btn-outline-light btn-sm">🎫 Ticket aperti</a>
        <a href="{{ url_for('closed_tickets') }}" class="btn btn-outline-light btn-sm">🗄 Archivio</a>
        {% if session.get("role") == "admin" %}
          <a href="{{ url_for('admin_cinemas') }}" class="btn btn-outline-light btn-sm">🎬 Cinema</a>
          <a href="{{ url_for('admin_users') }}" class="btn btn-outline-light btn-sm">👥 Utenti</a>
        {% endif %}
        <a href="{{ url_for('export_excel') }}?foglio=tutto" class="btn btn-outline-success btn-sm">📥 Scarica Excel</a>
        {% if session.get("role") == "admin" %}
          <a href="{{ url_for('import_excel') }}" class="btn btn-outline-warning btn-sm">📤 Importa</a>
        {% endif %}
        <a href="{{ url_for('logout') }}" class="btn btn-danger btn-sm"
          onclick="return confirm('Sei sicuro di voler uscire?')">🚪 Logout</a>
      </div>
    </div>
  </nav>

  <div class="container mt-4" style="max-width:580px;">
    <h2 class="page-heading">
      Modifica Problema <small>#{{ problem.id }}</small>
    </h2>

    <div class="card shadow-sm">
      <div class="card-body">
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Cinema</label>
            <select name="cinema" class="form-select" required>
              {% for c in cinemas %}
                <option value="{{ c.nome }}" {% if c.nome == problem.cinema %}selected{% endif %}>{{ c.nome }}</option>
              {% endfor %}
              {% if problem.cinema not in cinemas|map(attribute='nome')|list %}
                <option value="{{ problem.cinema }}" selected>{{ problem.cinema }} (non in lista)</option>
              {% endif %}
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Descrizione</label>
            <textarea name="tipo" class="form-control" rows="3" required>{{ problem.tipo }}</textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">Urgenza</label>
            <select name="urgenza" class="form-select">
              <option value="Non urgente" {% if problem.urgenza == 'Non urgente' %}selected{% endif %}>Non urgente</option>
              <option value="Urgente"     {% if problem.urgenza == 'Urgente'     %}selected{% endif %}>Urgente</option>
              <option value="Critico"     {% if problem.urgenza == 'Critico'     %}selected{% endif %}>Critico</option>
            </select>
          </div>
          <div class="mb-4">
            <label class="form-label">Stato</label>
            <select name="stato" class="form-select">
              <option value="Aperto"   {% if problem.stato == 'Aperto'   %}selected{% endif %}>Aperto</option>
              <option value="In corso" {% if problem.stato == 'In corso' %}selected{% endif %}>In corso</option>
              <option value="Chiuso"   {% if problem.stato == 'Chiuso'   %}selected{% endif %}>Chiuso</option>
            </select>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success">Salva modifiche</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Annulla</a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
