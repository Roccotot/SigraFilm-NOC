<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Login — SigraFilm NOC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-bg">

  <div class="login-box">
    <!-- Logo -->
    <div class="text-center mb-3">
      <a href="https://sigrafilm.com/" target="_blank">
        <img src="{{ url_for('static', filename='logo_sigra.png') }}" alt="SigraFilm" height="60">
      </a>
    </div>

    <div class="login-noc-label">Network Operations Center</div>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, msg in messages %}
          <div class="alert alert-{{ category }} py-2">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="nome.utente" required autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary w-100"
        style="padding:.6rem; font-size:.88rem; letter-spacing:.06em; font-weight:600;">
        Accedi
      </button>
    </form>
  </div>

</body>
</html>
